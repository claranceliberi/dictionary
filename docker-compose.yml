services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dict-backend
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - notebook-network

networks:
  notebook-network:
    external: true
    name: intelligent-notebook_notebook-network
